# ─────────────────────────────────────────────────────────────────────────────
# alembic.ini
# Alembic configuration for PostgreSQL migrations.
# ─────────────────────────────────────────────────────────────────────────────

[alembic]
# Path to migration scripts
script_location = alembic

# Template for new migration filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Override 'sqlalchemy.url' in env.py via DATABASE_URL env var
sqlalchemy.url = driver://user:pass@localhost/dbname

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
